<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDFA"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Logo -->
  <g transform="translate(540, 30)">
    <circle cx="60" cy="30" r="25" fill="url(#tealGrad)"/>
    <circle cx="60" cy="30" r="15" fill="white"/>
    <path d="M52 22 L52 38 L68 30 Z" fill="url(#tealGrad)"/>
    <text x="95" y="38" font-family="Georgia, serif" font-size="24" font-weight="600" fill="#0D9488">Prati<tspan fill="#2DD4BF">Connect</tspan></text>
  </g>

  <!-- Main headline -->
  <text x="600" y="130" text-anchor="middle" font-family="Inter, system-ui" font-size="36" font-weight="700" fill="#111827">La plateforme complete pour votre</text>
  <text x="600" y="175" text-anchor="middle" font-family="Inter, system-ui" font-size="36" font-weight="700" fill="#0D9488">activite de bien-etre</text>

  <!-- Feature icons in circle arrangement -->
  <!-- Calendar -->
  <g transform="translate(200, 250)">
    <circle cx="50" cy="50" r="45" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <rect x="25" y="30" width="50" height="40" rx="4" fill="none" stroke="#0D9488" stroke-width="2"/>
    <line x1="25" y1="42" x2="75" y2="42" stroke="#0D9488" stroke-width="2"/>
    <text x="50" y="130" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="#111827">Calendrier</text>
    <text x="50" y="148" text-anchor="middle" font-family="Inter" font-size="12" fill="#6B7280">intelligent</text>
  </g>

  <!-- Patients -->
  <g transform="translate(400, 220)">
    <circle cx="50" cy="50" r="45" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <circle cx="50" cy="40" r="12" fill="none" stroke="#0D9488" stroke-width="2"/>
    <path d="M30 75 C30 60 40 52 50 52 C60 52 70 60 70 75" fill="none" stroke="#0D9488" stroke-width="2"/>
    <text x="50" y="130" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="#111827">Gestion</text>
    <text x="50" y="148" text-anchor="middle" font-family="Inter" font-size="12" fill="#6B7280">patients</text>
  </g>

  <!-- Teleconsultation -->
  <g transform="translate(750, 220)">
    <circle cx="50" cy="50" r="45" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <rect x="25" y="30" width="40" height="30" rx="4" fill="none" stroke="#0D9488" stroke-width="2"/>
    <polygon points="65,40 80,32 80,58 65,50" fill="none" stroke="#0D9488" stroke-width="2"/>
    <text x="50" y="130" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="#111827">Tele-</text>
    <text x="50" y="148" text-anchor="middle" font-family="Inter" font-size="12" fill="#6B7280">consultation</text>
  </g>

  <!-- Billing -->
  <g transform="translate(950, 250)">
    <circle cx="50" cy="50" r="45" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <rect x="30" y="25" width="40" height="50" rx="2" fill="none" stroke="#0D9488" stroke-width="2"/>
    <line x1="38" y1="40" x2="62" y2="40" stroke="#0D9488" stroke-width="2"/>
    <line x1="38" y1="50" x2="55" y2="50" stroke="#0D9488" stroke-width="2"/>
    <text x="50" y="60" font-family="Inter" font-size="14" fill="#0D9488">€</text>
    <text x="50" y="130" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="#111827">Facturation</text>
    <text x="50" y="148" text-anchor="middle" font-family="Inter" font-size="12" fill="#6B7280">integree</text>
  </g>

  <!-- Center mockup placeholder -->
  <g transform="translate(475, 280)">
    <rect x="0" y="0" width="250" height="160" rx="8" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="0" y="0" width="250" height="30" rx="8" fill="#F3F4F6"/>
    <circle cx="20" cy="15" r="5" fill="#EF4444"/>
    <circle cx="38" cy="15" r="5" fill="#F59E0B"/>
    <circle cx="56" cy="15" r="5" fill="#22C55E"/>
    <text x="125" y="90" text-anchor="middle" font-family="Inter" font-size="14" fill="#9CA3AF">Dashboard Preview</text>
    <rect x="20" y="50" width="80" height="8" rx="2" fill="#E5E7EB"/>
    <rect x="20" y="70" width="60" height="8" rx="2" fill="#E5E7EB"/>
    <rect x="20" y="90" width="100" height="8" rx="2" fill="#E5E7EB"/>
    <rect x="150" y="50" width="80" height="60" rx="4" fill="#F0FDFA"/>
  </g>

  <!-- Badge -->
  <g transform="translate(440, 470)">
    <rect x="0" y="0" width="320" height="50" rx="25" fill="#22C55E"/>
    <text x="160" y="32" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="white">Commissions CB les plus basses : 1,15%</text>
  </g>

  <!-- CTA -->
  <g transform="translate(480, 550)">
    <rect x="0" y="0" width="240" height="50" rx="8" fill="url(#tealGrad)"/>
    <text x="120" y="32" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="white">Commencer gratuitement</text>
  </g>
</svg>
