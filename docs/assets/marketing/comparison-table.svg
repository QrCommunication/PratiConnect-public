<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter, system-ui" font-size="24" font-weight="700" fill="#111827">Comparatif des solutions</text>

  <!-- Table Header -->
  <rect x="20" y="70" width="760" height="50" fill="url(#headerGrad)" rx="8"/>
  <text x="120" y="102" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="white">Fonctionnalite</text>
  <text x="280" y="102" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="white">PratiConnect</text>
  <text x="420" y="102" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="white">Doctolib</text>
  <text x="560" y="102" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="white">CreaPulse</text>
  <text x="700" y="102" text-anchor="middle" font-family="Inter" font-size="14" font-weight="600" fill="white">Manuel</text>

  <!-- Row 1 - Highlighted -->
  <rect x="20" y="120" width="760" height="45" fill="#F0FDFA"/>
  <text x="120" y="148" text-anchor="middle" font-family="Inter" font-size="13" fill="#111827">Commission CB</text>
  <text x="280" y="148" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#22C55E">1,15%</text>
  <text x="420" y="148" text-anchor="middle" font-family="Inter" font-size="13" fill="#6B7280">1,90%</text>
  <text x="560" y="148" text-anchor="middle" font-family="Inter" font-size="13" fill="#6B7280">N/A</text>
  <text x="700" y="148" text-anchor="middle" font-family="Inter" font-size="13" fill="#6B7280">1,60%+</text>

  <!-- Row 2 -->
  <rect x="20" y="165" width="760" height="45" fill="#FFFFFF"/>
  <text x="120" y="193" text-anchor="middle" font-family="Inter" font-size="13" fill="#111827">Agenda integre</text>
  <circle cx="280" cy="188" r="10" fill="#22C55E"/><text x="280" y="193" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="420" cy="188" r="10" fill="#22C55E"/><text x="420" y="193" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="560" cy="188" r="10" fill="#22C55E"/><text x="560" y="193" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="700" cy="188" r="10" fill="#EF4444"/><text x="700" y="193" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>

