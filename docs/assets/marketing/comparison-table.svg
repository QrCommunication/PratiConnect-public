  <circle cx="280" cy="278" r="10" fill="#22C55E"/><text x="280" y="283" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="420" cy="278" r="10" fill="#EF4444"/><text x="420" y="283" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="560" cy="278" r="10" fill="#EF4444"/><text x="560" y="283" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="700" cy="278" r="10" fill="#EF4444"/><text x="700" y="283" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>

