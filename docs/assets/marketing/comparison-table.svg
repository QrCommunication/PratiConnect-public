  <text x="120" y="238" text-anchor="middle" font-family="Inter" font-size="13" fill="#111827">Teleconsultation</text>
  <circle cx="280" cy="233" r="10" fill="#22C55E"/><text x="280" y="238" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="420" cy="233" r="10" fill="#22C55E"/><text x="420" y="238" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="560" cy="233" r="10" fill="#EF4444"/><text x="560" y="238" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="700" cy="233" r="10" fill="#EF4444"/><text x="700" y="238" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>

