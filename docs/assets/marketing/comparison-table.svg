  <circle cx="280" cy="323" r="10" fill="#22C55E"/><text x="280" y="328" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="420" cy="323" r="10" fill="#EF4444"/><text x="420" y="328" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="560" cy="323" r="10" fill="#22C55E"/><text x="560" y="328" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="700" cy="323" r="10" fill="#EF4444"/><text x="700" y="328" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>

  <!-- Row 6 -->
  <rect x="20" y="345" width="760" height="45" fill="#FFFFFF"/>
  <text x="120" y="373" text-anchor="middle" font-family="Inter" font-size="13" fill="#111827">Specialise bien-etre</text>
  <circle cx="280" cy="368" r="10" fill="#22C55E"/><text x="280" y="373" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="420" cy="368" r="10" fill="#EF4444"/><text x="420" y="373" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="560" cy="368" r="10" fill="#22C55E"/><text x="560" y="373" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="700" cy="368" r="10" fill="#EF4444"/><text x="700" y="373" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>

  <!-- Row 7 -->
  <rect x="20" y="390" width="760" height="45" fill="#F9FAFB"/>
  <text x="120" y="418" text-anchor="middle" font-family="Inter" font-size="13" fill="#111827">Factur-X / eIDAS</text>
  <circle cx="280" cy="413" r="10" fill="#22C55E"/><text x="280" y="418" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✓</text>
  <circle cx="420" cy="413" r="10" fill="#EF4444"/><text x="420" y="418" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="560" cy="413" r="10" fill="#EF4444"/><text x="560" y="418" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>
  <circle cx="700" cy="413" r="10" fill="#EF4444"/><text x="700" y="418" text-anchor="middle" font-family="Inter" font-size="12" fill="white">✗</text>

  <!-- Row 8 - Highlighted -->
  <rect x="20" y="435" width="760" height="45" fill="#F0FDFA" stroke="#0D9488" stroke-width="2" rx="4"/>
  <text x="120" y="463" text-anchor="middle" font-family="Inter" font-size="13" font-weight="600" fill="#111827">Prix / mois</text>
  <text x="280" y="463" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#0D9488">29€ - 99€</text>
  <text x="420" y="463" text-anchor="middle" font-family="Inter" font-size="13" fill="#6B7280">129€+</text>
  <text x="560" y="463" text-anchor="middle" font-family="Inter" font-size="13" fill="#6B7280">39€ - 79€</text>
  <text x="700" y="463" text-anchor="middle" font-family="Inter" font-size="13" fill="#6B7280">0€*</text>

  <!-- Footer note -->
  <text x="400" y="520" text-anchor="middle" font-family="Inter" font-size="11" fill="#9CA3AF">* Cout cache : temps administratif estime a 5h/semaine = 250€/mois</text>

  <!-- Winner badge -->
  <g transform="translate(230, 540)">
    <rect x="0" y="0" width="140" height="35" rx="17" fill="#0D9488"/>
    <text x="70" y="23" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="white">Meilleur rapport</text>
  </g>
</svg>
