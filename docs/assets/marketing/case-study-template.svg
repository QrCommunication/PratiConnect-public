<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FFFFFF"/>

  <!-- Left side - Photo placeholder -->
  <rect x="0" y="0" width="480" height="800" fill="#F3F4F6"/>
  <circle cx="240" cy="300" r="120" fill="#E5E7EB"/>
  <text x="240" y="305" text-anchor="middle" font-family="Inter" font-size="16" fill="#9CA3AF">Photo</text>
  <text x="240" y="325" text-anchor="middle" font-family="Inter" font-size="16" fill="#9CA3AF">praticien</text>

  <!-- Quote -->
  <g transform="translate(60, 480)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="48" fill="#0D9488">"</text>
    <text x="30" y="30" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#374151">PratiConnect m'a permis de</text>
    <text x="30" y="55" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#374151">gagner 5h par semaine sur</text>
    <text x="30" y="80" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#374151">l'administratif.</text>
    <text x="340" y="80" font-family="Georgia, serif" font-size="48" fill="#0D9488">"</text>
  </g>

  <!-- Praticien info -->
  <text x="60" y="620" font-family="Inter" font-size="18" font-weight="600" fill="#111827">Sophie Martin</text>
  <text x="60" y="645" font-family="Inter" font-size="14" fill="#6B7280">Naturopathe - Lyon</text>
  <text x="60" y="670" font-family="Inter" font-size="14" fill="#6B7280">Cliente depuis 2024</text>

  <!-- Right side content -->
  <!-- KPIs -->
  <g transform="translate(520, 60)">
    <text x="0" y="0" font-family="Inter" font-size="12" font-weight="600" fill="#0D9488" letter-spacing="2">RESULTATS</text>

    <!-- KPI 1 -->
    <rect x="0" y="30" width="200" height="100" rx="8" fill="#F0FDFA"/>
    <text x="100" y="75" text-anchor="middle" font-family="Inter" font-size="36" font-weight="700" fill="#0D9488">-5h</text>
    <text x="100" y="105" text-anchor="middle" font-family="Inter" font-size="14" fill="#6B7280">par semaine</text>

    <!-- KPI 2 -->
    <rect x="220" y="30" width="200" height="100" rx="8" fill="#F0FDFA"/>
    <text x="320" y="75" text-anchor="middle" font-family="Inter" font-size="36" font-weight="700" fill="#0D9488">-40%</text>
    <text x="320" y="105" text-anchor="middle" font-family="Inter" font-size="14" fill="#6B7280">de no-show</text>

    <!-- KPI 3 -->
    <rect x="440" y="30" width="200" height="100" rx="8" fill="#F0FDFA"/>
    <text x="540" y="75" text-anchor="middle" font-family="Inter" font-size="36" font-weight="700" fill="#0D9488">+25%</text>
    <text x="540" y="105" text-anchor="middle" font-family="Inter" font-size="14" fill="#6B7280">de CA</text>
  </g>

  <!-- Challenge section -->
  <g transform="translate(520, 220)">
    <text x="0" y="0" font-family="Inter" font-size="12" font-weight="600" fill="#EF4444" letter-spacing="2">DEFI</text>
    <text x="0" y="35" font-family="Inter" font-size="16" fill="#374151">Sophie passait plus de 10h par semaine sur des</text>
    <text x="0" y="60" font-family="Inter" font-size="16" fill="#374151">taches administratives : relances, facturation,</text>
    <text x="0" y="85" font-family="Inter" font-size="16" fill="#374151">gestion de l'agenda...</text>
  </g>

  <!-- Solution section -->
  <g transform="translate(520, 350)">
    <text x="0" y="0" font-family="Inter" font-size="12" font-weight="600" fill="#0D9488" letter-spacing="2">SOLUTION</text>
    <text x="0" y="35" font-family="Inter" font-size="16" fill="#374151">• Agenda synchronise avec Google Calendar</text>
    <text x="0" y="65" font-family="Inter" font-size="16" fill="#374151">• Rappels automatiques par SMS</text>
    <text x="0" y="95" font-family="Inter" font-size="16" fill="#374151">• Facturation automatique apres chaque seance</text>
    <text x="0" y="125" font-family="Inter" font-size="16" fill="#374151">• Questionnaires pre-consultation en ligne</text>
  </g>

  <!-- Result section -->
  <g transform="translate(520, 530)">
    <text x="0" y="0" font-family="Inter" font-size="12" font-weight="600" fill="#22C55E" letter-spacing="2">RESULTAT</text>
    <text x="0" y="35" font-family="Inter" font-size="16" fill="#374151">En 6 mois, Sophie a pu prendre 20% de patients</text>
    <text x="0" y="60" font-family="Inter" font-size="16" fill="#374151">supplementaires tout en reduisant son stress et</text>
    <text x="0" y="85" font-family="Inter" font-size="16" fill="#374151">en ameliorant l'experience de ses patients.</text>
  </g>

  <!-- CTA -->
  <g transform="translate(520, 680)">
    <rect x="0" y="0" width="280" height="56" rx="8" fill="url(#tealGradient)"/>
    <text x="140" y="35" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="white">Commencer gratuitement</text>
  </g>

  <!-- Logo -->
  <g transform="translate(1050, 730)">
    <circle cx="30" cy="30" r="20" fill="url(#tealGradient)"/>
    <text x="60" y="38" font-family="Inter" font-size="14" font-weight="600" fill="#6B7280">PratiConnect</text>
  </g>
</svg>
